<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能运势分析 - 神秘AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.3/dist/purify.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #0a0e27;
            --accent-gold: #d4af37;
            --accent-silver: #c0c0c0;
            --secondary-purple: #2d1b69;
            --text-white: #ffffff;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--secondary-purple) 100%);
            color: var(--text-white);
            overflow-x: hidden;
        }
        
        .mystical-card {
            background: rgba(10, 14, 39, 0.8);
            border: 2px solid var(--accent-gold);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .glow-button {
            background: linear-gradient(45deg, var(--accent-gold), var(--accent-silver));
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .glow-button:hover {
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.8);
            transform: scale(1.05);
        }
        
        .input-field {
            background: rgba(10, 14, 39, 0.8);
            border: 2px solid var(--accent-gold);
            color: var(--text-white);
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--accent-silver);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        
        .chat-container {
            max-height: 520px;
            overflow-y: auto;
            scroll-behavior: smooth;
            background: radial-gradient(circle at top, rgba(79, 70, 229, 0.12), rgba(10, 14, 39, 0.85));
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: inset 0 0 30px rgba(139, 92, 246, 0.1);
        }

        .chat-message {
            position: relative;
            padding: 1rem;
            border-radius: 1rem;
            backdrop-filter: blur(6px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid transparent;
        }

        .chat-message:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
        }

        .ai-message {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.3), rgba(79, 70, 229, 0.25));
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.25);
        }

        .user-message {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.25), rgba(217, 119, 6, 0.2));
            border: 1px solid rgba(245, 158, 11, 0.4);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.2);
        }

        .message-metadata {
            font-size: 0.75rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .message-content {
            line-height: 1.7;
        }

        .message-content h2,
        .message-content h3,
        .message-content h4 {
            color: #fcd34d;
            font-weight: 700;
            margin-top: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .message-content p + p {
            margin-top: 0.75rem;
        }

        .message-content ul,
        .message-content ol {
            margin-left: 1.25rem;
            margin-top: 0.5rem;
        }

        .message-content ul li::marker {
            color: #fbbf24;
        }
        
        .zodiac-display {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.2));
            border: 2px solid #10b981;
        }
        
        .planet-orbit {
            animation: orbit 20s linear infinite;
        }
        
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(80px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(80px) rotate(-360deg); }
        }
        
        .typing-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #8b5cf6;
            animation: typing 1.4s infinite ease-in-out both;
        }
        
        .typing-indicator:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="fixed top-0 w-full z-50 bg-black bg-opacity-50 backdrop-blur-md border-b border-yellow-600">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-yellow-400">🔮 神秘AI</h1>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="index.html" class="text-white hover:text-yellow-400 px-3 py-2 text-sm font-medium">首页</a>
                        <a href="fortune-new.html" class="text-yellow-400 hover:text-white px-3 py-2 text-sm font-medium">AI运势分析</a>
                        <a href="tarot.html" class="text-white hover:text-yellow-400 px-3 py-2 text-sm font-medium">塔罗占卜</a>
                        <a href="settings.html" class="text-white hover:text-yellow-400 px-3 py-2 text-sm font-medium">🔑 设置</a>
                        <a href="test-api.html" class="text-white hover:text-yellow-400 px-3 py-2 text-sm font-medium">🧪 测试</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容区域 -->
    <main class="pt-20 min-h-screen">
        <!-- 标题区域 -->
        <section class="text-center py-12">
            <div class="max-w-4xl mx-auto px-4">
                <h1 class="text-5xl md:text-6xl font-bold text-yellow-400 mb-6">
                    🤖 AI智能运势分析
                </h1>
                <p class="text-xl text-gray-300 mb-8">
                    与AI占星师对话，获得个性化的深度运势解读
                </p>
            </div>
        </section>

        <!-- 分析流程 -->
        <section class="py-12">
            <div class="max-w-6xl mx-auto px-4">
                
                <!-- 步骤1：基础信息输入 -->
                <div id="step1" class="mystical-card rounded-2xl p-8 mb-8">
                    <div class="text-center mb-8">
                        <h2 class="text-3xl font-bold text-yellow-400 mb-4">📋 告诉AI您的基本信息</h2>
                        <p class="text-gray-300">AI需要了解您的基础信息来开始分析</p>
                    </div>
                    
                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="space-y-6">
                            <div>
                                <label class="block text-yellow-400 font-bold mb-2">出生日期 *</label>
                                <input type="date" id="birthDate" class="w-full px-4 py-3 rounded-lg input-field">
                            </div>
                            <div>
                                <label class="block text-yellow-400 font-bold mb-2">出生时间（可选）</label>
                                <input type="time" id="birthTime" class="w-full px-4 py-3 rounded-lg input-field">
                                <p class="text-xs text-gray-500 mt-1">精确时间有助于更准确的星象分析</p>
                            </div>
                            <div>
                                <label class="block text-yellow-400 font-bold mb-2">出生地（可选）</label>
                                <input type="text" id="birthPlace" class="w-full px-4 py-3 rounded-lg input-field" placeholder="例如：北京">
                            </div>
                        </div>
                        <div class="space-y-6">
                            <div>
                                <label class="block text-yellow-400 font-bold mb-2">您最关心的问题 *</label>
                                <textarea id="mainConcern" class="w-full px-4 py-3 rounded-lg input-field h-32 resize-none" 
                                    placeholder="例如：最近工作压力很大，感情也遇到了问题，想知道近期运势如何..."></textarea>
                            </div>
                            <div>
                                <label class="block text-yellow-400 font-bold mb-2">希望重点分析的方面</label>
                                <div class="grid grid-cols-2 gap-3">
                                    <label class="flex items-center space-x-2">
                                        <input type="checkbox" name="focus" value="love" class="text-yellow-400">
                                        <span>💕 感情运势</span>
                                    </label>
                                    <label class="flex items-center space-x-2">
                                        <input type="checkbox" name="focus" value="career" class="text-yellow-400">
                                        <span>💼 事业发展</span>
                                    </label>
                                    <label class="flex items-center space-x-2">
                                        <input type="checkbox" name="focus" value="wealth" class="text-yellow-400">
                                        <span>💰 财运状况</span>
                                    </label>
                                    <label class="flex items-center space-x-2">
                                        <input type="checkbox" name="focus" value="health" class="text-yellow-400">
                                        <span>🏥 健康状态</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="text-center mt-8">
                        <button onclick="startAIAnalysis()" class="glow-button px-12 py-4 rounded-full text-black font-bold text-xl">
                            🚀 开始AI分析
                        </button>
                    </div>
                </div>

                <!-- 步骤2：星座和基础分析 -->
                <div id="step2" class="mystical-card rounded-2xl p-8 mb-8 hidden">
                    <div class="text-center mb-6">
                        <h2 class="text-3xl font-bold text-yellow-400 mb-4">⭐ 您的星象信息</h2>
                    </div>
                    
                    <div class="grid md:grid-cols-2 gap-8 mb-8">
                        <!-- 星座信息 -->
                        <div id="zodiacDisplay" class="zodiac-display rounded-xl p-6">
                            <!-- 星座信息将在这里显示 -->
                        </div>

                        <!-- 行星位置 -->
                        <div class="mystical-card rounded-xl p-6">
                            <h3 class="text-xl font-bold text-yellow-400 mb-4 text-center">🌌 当前行星影响</h3>
                            <div id="planetaryInfluence" class="space-y-3">
                                <!-- 行星影响将在这里显示 -->
                            </div>
                        </div>
                    </div>

                    <!-- 星象速览 -->
                    <div id="astrologySummary" class="grid gap-4 md:grid-cols-2 xl:grid-cols-4 mb-6 hidden">
                        <!-- 动态生成的星象速览卡片 -->
                    </div>

                    <div id="astrologyNarrative" class="mystical-card rounded-xl p-6 hidden">
                        <!-- 星象叙述将在这里显示 -->
                    </div>

                    <!-- 初步AI分析 -->
                    <div class="border-t border-yellow-600 pt-6">
                        <h3 class="text-2xl font-bold text-yellow-400 mb-4 text-center">🤖 AI初步分析</h3>
                        <div id="initialAnalysis" class="ai-message rounded-lg p-6">
                            <div class="flex items-center space-x-2 mb-4">
                                <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center text-white font-bold">AI</div>
                                <span class="font-bold text-purple-200">AI占星师正在分析...</span>
                            </div>
                            <div id="analysisContent" class="text-purple-100 leading-relaxed">
                                <!-- AI分析内容将在这里显示 -->
                            </div>
                        </div>
                    </div>
                    
                    <div class="text-center mt-8">
                        <button onclick="continueToChat()" class="glow-button px-8 py-3 rounded-full text-black font-bold text-lg" disabled>
                            💬 继续深入对话
                        </button>
                    </div>
                </div>

                <!-- 步骤3：AI对话分析 -->
                <div id="step3" class="mystical-card rounded-2xl p-8 mb-8 hidden">
                    <div class="text-center mb-6">
                        <h2 class="text-3xl font-bold text-yellow-400 mb-4">💬 与AI占星师深度对话</h2>
                        <p class="text-gray-300">AI会根据您的回答进行更精准的分析</p>
                    </div>
                    
                    <!-- 对话区域 -->
        <div id="chatContainer" class="chat-container rounded-2xl p-6 mb-6 space-y-4">
            <div id="chatMessages" class="space-y-4">
                <!-- 对话消息将在这里显示 -->
            </div>
        </div>

        <!-- 用户输入区域 -->
        <div id="userInputArea" class="flex space-x-4">
            <textarea id="userInput" class="flex-1 px-4 py-3 rounded-lg input-field resize-none" rows="3"
                placeholder="请详细描述您的情况..."></textarea>
            <button onclick="sendMessage()" class="glow-button px-6 py-3 rounded-lg text-black font-bold">
                发送
            </button>
        </div>

        <div id="chatSummaryActions" class="hidden mt-6">
            <div class="mystical-card rounded-2xl p-6">
                <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">
                    <div class="flex-1">
                        <h3 class="text-2xl font-bold text-yellow-400 mb-2">📝 对话总结选项</h3>
                        <p class="text-gray-300 text-sm leading-relaxed">
                            是否需要我将本次对话和最初的问题进行简要归纳？您可以快速获取要点，再决定是否生成完整运势报告。
                        </p>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <button id="generateSummaryBtn" onclick="requestChatSummary()"
                            class="glow-button px-6 py-3 rounded-full text-black font-bold">
                            🪄 生成对话总结
                        </button>
                        <button onclick="generateFinalReport()"
                            class="border-2 border-yellow-400 text-yellow-400 hover:bg-yellow-400 hover:text-black px-6 py-3 rounded-full font-bold transition-all duration-300">
                            📊 生成综合报告
                        </button>
                    </div>
                </div>
                <div id="chatSummaryResult" class="hidden mt-6 p-4 rounded-xl bg-black bg-opacity-40 border border-yellow-500/40">
                    <h4 class="text-yellow-300 font-bold mb-3">✨ 运势要点总结</h4>
                    <div id="chatSummaryContent" class="message-content text-gray-200 text-sm leading-relaxed"></div>
                </div>
            </div>
        </div>
                </div>

                <!-- 步骤4：最终综合分析 -->
                <div id="step4" class="mystical-card rounded-2xl p-8 hidden">
                    <div class="text-center mb-8">
                        <h2 class="text-4xl font-bold text-yellow-400 mb-4">📊 AI综合运势报告</h2>
                        <p class="text-gray-300">基于完整对话的个性化深度分析</p>
                    </div>
                    
                    <div id="finalReport" class="space-y-8">
                        <!-- 最终报告将在这里显示 -->
                    </div>
                    
                    <div class="text-center mt-8 space-x-4">
                        <button onclick="shareReport()" class="glow-button px-6 py-3 rounded-full text-black font-bold">
                            📤 分享报告
                        </button>
                        <button onclick="restartAnalysis()" class="border-2 border-yellow-400 text-yellow-400 hover:bg-yellow-400 hover:text-black px-6 py-3 rounded-full font-bold transition-all duration-300">
                            🔄 重新分析
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="main.js"></script>
    <script>
        // 全局状态管理
        let userProfile = {};
        let conversationHistory = [];
        let currentQuestionIndex = 0;
        let analysisData = {};
        let followUpQuestions = [];
        let typingIndicator = null;
        let summarySectionVisible = false;
        let summaryGenerated = false;

        marked.setOptions({
            breaks: true,
            gfm: true
        });

        const defaultFollowUps = [
            "请详细描述一下您最近的心情状态和情绪变化？",
            "您目前面临的最大挑战或困扰是什么？",
            "在您关心的领域中，有什么具体的目标或期望吗？",
            "您最近是否经历了重要的人生变化或决定？"
        ];

        // 开始AI分析
        async function startAIAnalysis() {
            const birthDate = document.getElementById('birthDate').value;
            const birthTime = document.getElementById('birthTime').value;
            const birthPlace = document.getElementById('birthPlace').value;
            const mainConcern = document.getElementById('mainConcern').value.trim();
            
            if (!birthDate || !mainConcern) {
                alert('请填写必填信息：出生日期和关心的问题');
                return;
            }
            
            // 获取用户选择的关注点
            const focusAreas = Array.from(document.querySelectorAll('input[name="focus"]:checked'))
                .map(cb => cb.value);
            
            // 保存用户信息
            userProfile = {
                birthDate,
                birthTime,
                birthPlace,
                mainConcern,
                focusAreas,
                zodiacSign: window.mysticalAI.getZodiacSign(birthDate)
            };

            summarySectionVisible = false;
            summaryGenerated = false;
            document.getElementById('chatSummaryActions').classList.add('hidden');
            document.getElementById('chatSummaryResult').classList.add('hidden');
            document.getElementById('chatSummaryContent').innerHTML = '';

            // 隐藏第一步，显示第二步
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            
            // 显示星座信息
            displayZodiacInfo();
            
            // 开始AI初步分析
            await performInitialAnalysis();
        }

        // 显示星座信息
        function displayZodiacInfo() {
            const zodiacDisplay = document.getElementById('zodiacDisplay');
            const sign = userProfile.zodiacSign;

            zodiacDisplay.innerHTML = `
                <div class="text-center">
                    <div class="text-6xl mb-4">${sign.symbol}</div>
                    <h3 class="text-2xl font-bold text-green-300 mb-2">${sign.name}</h3>
                    <p class="text-green-100 mb-4">${sign.dates}</p>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <span class="text-green-300 font-bold">元素:</span>
                            <span class="text-green-100">${sign.element}</span>
                        </div>
                        <div>
                            <span class="text-green-300 font-bold">守护星:</span>
                            <span class="text-green-100">${sign.planet}</span>
                        </div>
                    </div>
                </div>
            `;

            // 显示行星影响
            displayPlanetaryInfluence(analysisData.activePlanets || []);
        }

        // 显示行星影响
        function displayPlanetaryInfluence(activePlanets = []) {
            const planetaryDiv = document.getElementById('planetaryInfluence');

            const planets = [
                { name: '太阳', symbol: '☀️', influence: '核心能量与生命力', color: '#fbbf24' },
                { name: '月亮', symbol: '🌙', influence: '情感与直觉', color: '#e5e7eb' },
                { name: '水星', symbol: '☿️', influence: '沟通与思维', color: '#fb923c' },
                { name: '金星', symbol: '♀️', influence: '爱情与美感', color: '#f472b6' },
                { name: '火星', symbol: '♂️', influence: '行动与激情', color: '#dc2626' },
                { name: '木星', symbol: '♃', influence: '扩张与幸运', color: '#34d399' },
                { name: '土星', symbol: '♄', influence: '责任与结构', color: '#60a5fa' },
                { name: '天王星', symbol: '♅', influence: '革新与突变', color: '#22d3ee' },
                { name: '海王星', symbol: '♆', influence: '梦想与灵感', color: '#a855f7' },
                { name: '冥王星', symbol: '♇', influence: '转化与觉醒', color: '#f87171' }
            ];

            planetaryDiv.innerHTML = planets.map(planet => `
                <div class="flex items-center space-x-3 p-2 rounded bg-black bg-opacity-20 ${activePlanets.includes(planet.name) ? 'border border-yellow-500 shadow-lg shadow-yellow-500/30' : ''}">
                    <div class="text-2xl">${planet.symbol}</div>
                    <div class="flex-1">
                        <div class="font-bold flex items-center space-x-2" style="color: ${planet.color}">
                            <span>${planet.name}</span>
                            ${activePlanets.includes(planet.name) ? '<span class="text-xs text-yellow-300 bg-yellow-900 bg-opacity-40 px-2 py-0.5 rounded-full">重点影响</span>' : ''}
                        </div>
                        <div class="text-sm text-gray-300">${planet.influence}</div>
                    </div>
                </div>
            `).join('');
        }

        function showAstrologyOverview(astrologyData) {
            const summaryContainer = document.getElementById('astrologySummary');
            const narrativeContainer = document.getElementById('astrologyNarrative');

            if (!astrologyData) {
                summaryContainer.classList.add('hidden');
                narrativeContainer.classList.add('hidden');
                return;
            }

            const metrics = [
                { key: 'love', label: '爱情', icon: '💕' },
                { key: 'career', label: '事业', icon: '💼' },
                { key: 'wealth', label: '财运', icon: '💰' },
                { key: 'health', label: '健康', icon: '🏥' }
            ];

            const cardsHTML = metrics.map(metric => {
                const value = astrologyData[metric.key];
                const displayValue = typeof value === 'number' ? `${value}%` : '—';

                return `
                    <div class="mystical-card rounded-xl p-4">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-2xl">${metric.icon}</span>
                            <span class="text-yellow-300 text-sm">${metric.label}</span>
                        </div>
                        <div class="text-3xl font-bold text-white">${displayValue}</div>
                        <div class="mt-2 text-xs text-gray-300">${metric.label}能量指数</div>
                    </div>
                `;
            }).join('');

            summaryContainer.innerHTML = cardsHTML;

            summaryContainer.classList.remove('hidden');

            const narrativeParts = [
                astrologyData.description ? `✨ <span class="font-semibold text-yellow-300">星座提醒：</span>${astrologyData.description}` : '',
                astrologyData.advice ? `🪐 <span class="font-semibold text-yellow-300">行动建议：</span>${astrologyData.advice}` : '',

            ].filter(Boolean);

            if (narrativeParts.length) {
                narrativeContainer.innerHTML = `
                    <div class="space-y-3 text-purple-100 leading-relaxed">

                    </div>
                `;
                narrativeContainer.classList.remove('hidden');
            } else {
                narrativeContainer.classList.add('hidden');
            }
        }

        function identifyActivePlanets(text) {
            if (!text) return [];

            const planetMap = {
                '太阳': '太阳', 'sun': '太阳',
                '月亮': '月亮', 'moon': '月亮',
                '水星': '水星', 'mercury': '水星',
                '金星': '金星', 'venus': '金星',
                '火星': '火星', 'mars': '火星',
                '木星': '木星', 'jupiter': '木星',
                '土星': '土星', 'saturn': '土星',
                '天王星': '天王星', 'uranus': '天王星',
                '海王星': '海王星', 'neptune': '海王星',
                '冥王星': '冥王星', 'pluto': '冥王星'
            };

            const lowerText = text.toLowerCase();
            const active = new Set();

            Object.entries(planetMap).forEach(([keyword, planetName]) => {
                if (lowerText.includes(keyword.toLowerCase())) {
                    active.add(planetName);
                }
            });

            return Array.from(active);
        }

        function safeJSONParse(text) {
            if (!text) return null;

            let cleaned = text.trim();
            if (cleaned.startsWith('```')) {
                cleaned = cleaned.replace(/```json|```/gi, '').trim();
            }

            try {
                return JSON.parse(cleaned);
            } catch (error) {
                console.warn('JSON解析失败:', error, cleaned);
                return null;
            }
        }

        // 执行初步分析
        async function performInitialAnalysis() {
            const analysisContent = document.getElementById('analysisContent');

            try {
                // 显示加载状态
                analysisContent.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <div class="typing-indicator"></div>
                        <div class="typing-indicator"></div>
                        <div class="typing-indicator"></div>

                    </div>

                // 计算星象洞察
                const astrologyInsights = await window.mysticalAI.analyzeAstrologyWithAI(userProfile.birthDate);
                analysisData.astrology = astrologyInsights;
                analysisData.activePlanets = identifyActivePlanets(astrologyInsights.aiAnalysis);

                showAstrologyOverview(astrologyInsights);
                displayPlanetaryInfluence(analysisData.activePlanets);

                const focusDescription = userProfile.focusAreas.length
                    ? userProfile.focusAreas.map(area => ({
                        love: '感情',
                        career: '事业',
                        wealth: '财务',
                        health: '健康'
                    }[area] || area).join('、'))

                const initialPrompt = `
                请作为一位专业的AI占星师，结合DeepSeek星象推演结果，为用户提供初步的运势分析。

                用户信息：
                - 生日：${userProfile.birthDate}
                - 星座：${userProfile.zodiacSign.name} (${userProfile.zodiacSign.symbol})
                - 出生时间：${userProfile.birthTime || '未提供'}
                - 出生地：${userProfile.birthPlace || '未提供'}
                - 主要关心的问题：${userProfile.mainConcern}
                - 希望重点关注：${focusDescription}

                星象参考：
                - 星座能量分布：爱情${astrologyInsights.love}%，事业${astrologyInsights.career}%，财运${astrologyInsights.wealth}%，健康${astrologyInsights.health}%
                - 星座提醒：${astrologyInsights.description}
                - 行动建议：${astrologyInsights.advice}
                - DeepSeek星象洞察：${astrologyInsights.aiAnalysis}

                请输出：
                1. 基于星座特质的个性与当前状态概览
                2. 重点行星及其对近期运势的影响（请点名涉及的行星）
                3. 针对用户关心问题的初步洞察
                4. 各领域运势评估与建议（爱情、事业、财运、健康）

                语言要专业而神秘，像真正的占星师。长度控制在400字左右。
                `;

                const response = await window.mysticalAI.callDeepSeekAPI(initialPrompt, 'fortune');

                // 显示分析结果
                analysisContent.innerHTML = `
                    <p class="text-xs text-purple-200 uppercase tracking-widest">DeepSeek 初步推断</p>
                    <div class="mt-3 leading-relaxed">${response}</div>
                `;

                // 启用继续按钮
                const continueButton = document.querySelector('#step2 button');
                continueButton.disabled = false;
                continueButton.classList.remove('opacity-50');

                // 保存初步分析
                analysisData.initialAnalysis = response;

                await prepareFollowUpPlan(response);

            } catch (error) {
                console.error('初步分析失败:', error);
                analysisContent.innerHTML = `
                    <div class="text-red-300">
                        抱歉，AI分析服务暂时不可用。请检查API配置或稍后再试。
                        <br><br>
                        基于您的星座${userProfile.zodiacSign.name}，这里是基础分析：
                        您的星座特质显示出强烈的个性，当前时期适合关注个人成长和目标实现。
                    </div>
                `;
                const continueButton = document.querySelector('#step2 button');
                continueButton.disabled = false;
                followUpQuestions = [...defaultFollowUps];
                analysisData.followUpPlan = {
                    conversationGoal: '了解用户的情绪波动与关键事件',
                    insightsToWatch: []
                };
            }
        }

        async function prepareFollowUpPlan(initialAnalysisText) {
            try {
                const focusDescription = userProfile.focusAreas.length
                    ? userProfile.focusAreas.map(area => ({
                        love: '感情',
                        career: '事业',
                        wealth: '财务',
                        health: '健康'
                    }[area] || area).join('、'))
                    : '整体生活状态';

                const planPrompt = `
                你是一位富有同理心的AI占星师。根据以下初步分析内容与星象洞察，为用户设计一轮深入提问，帮助进一步了解用户最近的情绪、经历和挑战。

                初步分析：${initialAnalysisText}
                星象重点：${analysisData.astrology?.aiAnalysis || '无' }
                用户关注方向：${focusDescription}

                请以JSON格式返回，不要添加额外说明。格式如下：
                {
                    "conversationGoal": "本轮追问希望了解的重点",
                    "questions": ["问题1", "问题2", "问题3"],
                    "insightsToWatch": ["需要特别留意的星象或情绪线索", ...]
                }
                所有问题需要与用户近期的状态、心情或事件相关，并便于用户作出详细回答。
                `;

                const planResponse = await window.mysticalAI.callDeepSeekAPI(planPrompt, 'fortune');
                const parsedPlan = safeJSONParse(planResponse);

                if (parsedPlan && Array.isArray(parsedPlan.questions) && parsedPlan.questions.length) {
                    followUpQuestions = parsedPlan.questions;
                    analysisData.followUpPlan = parsedPlan;
                } else {
                    followUpQuestions = [...defaultFollowUps];
                    analysisData.followUpPlan = {
                        conversationGoal: '了解用户的情绪波动与关键事件',
                        insightsToWatch: []
                    };
                }

            } catch (error) {
                console.warn('生成追问计划失败，使用默认问题:', error);
                followUpQuestions = [...defaultFollowUps];
                analysisData.followUpPlan = {
                    conversationGoal: '了解用户的情绪波动与关键事件',
                    insightsToWatch: []
                };
            }
        }

        // 继续到对话环节
        function continueToChat() {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            document.getElementById('chatSummaryActions').classList.add('hidden');
            summarySectionVisible = false;
            summaryGenerated = false;

            // 开始AI对话
            startAIChat();
        }

        // 开始AI对话
        async function startAIChat() {
            const chatMessages = document.getElementById('chatMessages');

            // 添加AI开场消息
            const opening = analysisData.followUpPlan?.conversationGoal
                ? `基于刚才的星象推断，我希望进一步了解${analysisData.followUpPlan.conversationGoal}。请随意分享，您的感受越具体越好。`
                : '基于初步分析，我想更深入了解您的情况。让我们开始深度对话吧！';
            addChatMessage('ai', opening);

            // 开始第一个问题
            await askNextQuestion();
        }

        // 提出下一个问题
        async function askNextQuestion() {
            if (!followUpQuestions.length) {
                followUpQuestions = [...defaultFollowUps];
            }

            if (currentQuestionIndex < followUpQuestions.length) {
                const question = followUpQuestions[currentQuestionIndex];

                setTimeout(() => {
                    addChatMessage('ai', question);
                    currentQuestionIndex++;
                }, 1000);
            } else {
                setTimeout(() => {
                    addChatMessage('ai', '感谢您详细的分享！我们已收集到关键线索，接下来您可以先查看对话总结，再决定是否生成完整的综合运势报告。');
                    showSummaryActions();
                }, 1000);
            }
        }

        // 添加聊天消息
        function addChatMessage(sender, message) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            const formattedMessage = renderMarkdown(message);

            if (sender === 'ai') {
                messageDiv.className = 'chat-message ai-message';
                messageDiv.innerHTML = `
                    <div class="flex items-start space-x-4">
                        <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-lg shadow-purple-500/30">AI</div>
                        <div class="flex-1">
                            <div class="message-metadata text-purple-200 mb-1 tracking-[0.25em]">MYSTIC AI</div>
                            <div class="message-content text-purple-100 leading-relaxed">${formattedMessage}</div>
                        </div>
                    </div>
                `;
            } else {
                messageDiv.className = 'chat-message user-message';
                messageDiv.innerHTML = `
                    <div class="flex items-start space-x-4 justify-end">
                        <div class="flex-1 text-right">
                            <div class="message-metadata text-amber-200 mb-1 tracking-[0.3em]">用户</div>
                            <div class="message-content text-yellow-100 leading-relaxed">${formattedMessage}</div>
                        </div>
                        <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center text-black font-bold text-sm shadow-lg shadow-yellow-400/30">您</div>
                    </div>
                `;
            }

            chatMessages.appendChild(messageDiv);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;

            conversationHistory.push({ sender, message });
        }

        // 发送消息
        async function sendMessage() {
            const userInput = document.getElementById('userInput');
            const message = userInput.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            addChatMessage('user', message);
            userInput.value = '';
            
            // 禁用输入区域
            document.getElementById('userInputArea').style.pointerEvents = 'none';
            document.getElementById('userInputArea').style.opacity = '0.6';
            
            // AI思考和回应
            setTimeout(async () => {
                await aiRespond(message);
                
                // 重新启用输入区域
                document.getElementById('userInputArea').style.pointerEvents = 'auto';
                document.getElementById('userInputArea').style.opacity = '1';
                
                // 继续提问
                setTimeout(askNextQuestion, 1500);
            }, 1000);
        }

        // AI回应
        async function aiRespond(userMessage) {
            try {
                showTypingIndicator();
                const contextPrompt = `
                作为AI占星师，基于用户的回答继续对话：

                用户刚才说：${userMessage}

                之前的分析：${analysisData.initialAnalysis}

                星象洞察：${analysisData.astrology?.aiAnalysis || '暂无星象数据'}
                重点关注：${analysisData.followUpPlan?.insightsToWatch?.join('；') || '留意用户提到的关键事件与情绪'}

                请给出简短的回应（50-100字），表示理解并可能提供一些初步建议或洞察。
                保持专业占星师的语调。
                `;

                const response = await window.mysticalAI.callDeepSeekAPI(contextPrompt, 'fortune');
                hideTypingIndicator();
                addChatMessage('ai', response);

            } catch (error) {
                hideTypingIndicator();
                addChatMessage('ai', '我理解您的情况。让我们继续深入分析...');
            }
        }

        function showTypingIndicator() {
            if (typingIndicator) return;

            const chatMessages = document.getElementById('chatMessages');
            typingIndicator = document.createElement('div');
            typingIndicator.className = 'chat-message ai-message';
            typingIndicator.innerHTML = `
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center text-white font-bold text-sm">AI</div>
                    <div class="flex-1 flex space-x-2">
                        <span class="typing-indicator"></span>
                        <span class="typing-indicator"></span>
                        <span class="typing-indicator"></span>
                    </div>
                </div>
            `;

            chatMessages.appendChild(typingIndicator);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        }

        function hideTypingIndicator() {
            if (!typingIndicator) return;
            typingIndicator.remove();
            typingIndicator = null;
        }

        function renderMarkdown(message) {
            if (!message) {
                return '';
            }

            try {
                const html = marked.parse(message);
                return DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
            } catch (error) {
                console.warn('Markdown 渲染失败:', error);
                return DOMPurify.sanitize(message);
            }
        }

        function showSummaryActions() {
            if (summarySectionVisible) return;

            summarySectionVisible = true;
            summaryGenerated = false;

            const actions = document.getElementById('chatSummaryActions');
            actions.classList.remove('hidden');

            const result = document.getElementById('chatSummaryResult');
            result.classList.add('hidden');
            document.getElementById('chatSummaryContent').innerHTML = '';

            const button = document.getElementById('generateSummaryBtn');
            button.disabled = false;
            button.textContent = '🪄 生成对话总结';
        }

        async function requestChatSummary() {
            if (summaryGenerated) return;

            const button = document.getElementById('generateSummaryBtn');
            button.disabled = true;
            button.textContent = '✨ 正在生成...';

            const summaryResult = document.getElementById('chatSummaryResult');
            summaryResult.classList.remove('hidden');
            document.getElementById('chatSummaryContent').innerHTML = '<div class="text-gray-300">AI正在整理关键信息...</div>';

            try {
                const summaryPrompt = `
                作为AI占星师，请用温暖且专业的口吻，总结以下对话中的关键信息，并对用户最初的问题给出两点简洁的回应：

                用户基础信息：
                - 生日：${userProfile.birthDate}
                - 星座：${userProfile.zodiacSign?.name || '未知'}
                - 初始问题：${userProfile.mainConcern}
                - 关注领域：${userProfile.focusAreas.join('、') || '未指定'}

                对话交流：
                ${conversationHistory.map(entry => `${entry.sender === 'ai' ? 'AI' : '用户'}: ${entry.message}`).join('\n')}

                请输出Markdown格式：
                - 以二级标题开头，例如“## 今日对话摘要”。
                - 列出运势核心要点的无序列表。
                - 使用有序列表简要回答用户的原始问题，每点不超过30字。
                - 最后给出一句鼓励性的提醒。
                字数控制在120-180字。
                `;

                const summary = await window.mysticalAI.callDeepSeekAPI(summaryPrompt, 'fortune');
                const content = renderMarkdown(summary);
                document.getElementById('chatSummaryContent').innerHTML = content;
                summaryGenerated = true;
            } catch (error) {
                console.error('总结生成失败:', error);
                document.getElementById('chatSummaryContent').innerHTML = '<div class="text-red-300">抱歉，总结生成失败，请稍后重试。</div>';
                summaryGenerated = false;
            } finally {
                button.disabled = summaryGenerated;
                button.textContent = summaryGenerated ? '✅ 已生成总结' : '🪄 生成对话总结';
            }
        }

        // 生成最终报告
        async function generateFinalReport() {
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');
            
            const finalReport = document.getElementById('finalReport');
            
            try {
                // 显示生成中状态
                finalReport.innerHTML = `
                    <div class="text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-yellow-400 mx-auto mb-4"></div>
                        <p class="text-yellow-300">AI正在生成您的个性化运势报告...</p>
                    </div>
                `;
                
                const finalPrompt = `
                基于完整的对话，生成一份综合运势分析报告：

                用户基础信息：
                - 生日：${userProfile.birthDate}
                - 星座：${userProfile.zodiacSign.name}
                - 主要关心：${userProfile.mainConcern}
                - 关注领域：${userProfile.focusAreas.join(', ')}

                星象概览：
                - 星座能量指数：爱情${analysisData.astrology?.love || '未知'}%，事业${analysisData.astrology?.career || '未知'}%，财运${analysisData.astrology?.wealth || '未知'}%，健康${analysisData.astrology?.health || '未知'}%
                - 星象叙述：${analysisData.astrology?.aiAnalysis || '无'}
                - 重点行星：${(analysisData.activePlanets || []).join('、') || '未识别'}

                完整对话历史：
                ${conversationHistory.map(msg => `${msg.sender}: ${msg.message}`).join('\n')}

                请生成包含以下部分的详细报告：
                1. 个性特质与天赋分析
                2. 当前星象影响评估
                3. 各领域运势详解（爱情、事业、财运、健康）
                4. 近期运势变化趋势
                5. 具体行动建议
                6. 需要注意的事项

                每个部分要详细且实用，总字数800-1200字。
                `;
                
                const report = await window.mysticalAI.callDeepSeekAPI(finalPrompt, 'fortune');
                
                // 显示最终报告
                displayFinalReport(report);
                
            } catch (error) {
                console.error('最终报告生成失败:', error);
                finalReport.innerHTML = `
                    <div class="text-center text-red-300">
                        报告生成失败，请稍后重试或检查API配置。
                    </div>
                `;
            }
        }

        // 显示最终报告
        function displayFinalReport(report) {
            const finalReport = document.getElementById('finalReport');
            
            // 解析报告并格式化显示
            const sections = report.split(/\d+\.\s+/).filter(s => s.trim());
            
            finalReport.innerHTML = `
                <div class="space-y-8">
                    ${sections.map((section, index) => {
                        const titles = [
                            '📋 个性特质与天赋分析',
                            '⭐ 当前星象影响评估', 
                            '💎 各领域运势详解',
                            '📈 近期运势变化趋势',
                            '💡 具体行动建议',
                            '⚠️ 需要注意的事项'
                        ];
                        
                        return `
                            <div class="mystical-card rounded-xl p-6">
                                <h3 class="text-2xl font-bold text-yellow-400 mb-4">${titles[index] || '分析内容'}</h3>
                                <div class="text-gray-200 leading-relaxed whitespace-pre-line">${section.trim()}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // 分享报告
        function shareReport() {
            const reportText = `🔮 我的AI运势分析报告\n\n星座：${userProfile.zodiacSign.name}\n生日：${userProfile.birthDate}\n\n来自神秘AI的个性化深度分析`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'AI运势分析报告',
                    text: reportText
                });
            } else {
                navigator.clipboard.writeText(reportText).then(() => {
                    alert('报告链接已复制到剪贴板！');
                });
            }
        }

        // 重新开始分析
        function restartAnalysis() {
            // 重置所有状态
            userProfile = {};
            conversationHistory = [];
            currentQuestionIndex = 0;
            analysisData = {};
            followUpQuestions = [];
            typingIndicator = null;
            summarySectionVisible = false;
            summaryGenerated = false;

            // 重置界面
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.add('hidden');
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('chatSummaryActions').classList.add('hidden');
            document.getElementById('chatSummaryResult').classList.add('hidden');
            document.getElementById('chatSummaryContent').innerHTML = '';

            // 清空输入
            document.getElementById('birthDate').value = '';
            document.getElementById('birthTime').value = '';
            document.getElementById('birthPlace').value = '';
            document.getElementById('mainConcern').value = '';
            document.querySelectorAll('input[name="focus"]').forEach(cb => cb.checked = false);
            
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 设置默认日期为今天
            document.getElementById('birthDate').value = new Date().toISOString().split('T')[0];
            
            // 绑定回车键发送消息
            document.getElementById('userInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });
    </script>
