<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API设置 - 神秘AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #2d1b69 100%);
            color: #ffffff;
            min-height: 100vh;
        }
        
        .mystical-card {
            background: rgba(10, 14, 39, 0.8);
            border: 2px solid #d4af37;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .mystical-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.3);
        }
        
        .glow-button {
            background: linear-gradient(45deg, #d4af37, #c0c0c0);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .glow-button:hover {
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.8);
            transform: scale(1.05);
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #d4af37;
            color: #ffffff;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #c0c0c0;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }
        
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="fixed top-0 w-full z-50 bg-black bg-opacity-50 backdrop-blur-md border-b border-yellow-600">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-yellow-400">🔮 神秘AI</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-white hover:text-yellow-400 transition-colors">返回首页</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="pt-20 min-h-screen flex items-center justify-center px-4">
        <div class="max-w-2xl w-full">
            <div class="mystical-card rounded-2xl p-8">
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-bold text-yellow-400 mb-4">🔑 API设置</h1>
                    <p class="text-gray-300">配置DeepSeek API密钥以启用AI增强功能</p>
                </div>

                <!-- API密钥设置表单 -->
                <form id="apiKeyForm" class="space-y-6">
                    <div>
                        <label for="apiKey" class="block text-yellow-400 font-medium mb-2">DeepSeek API密钥</label>
                        <input
                            type="password"
                            id="apiKey"
                            name="apiKey"
                            class="input-field w-full px-4 py-3 rounded-lg"
                            placeholder="留空以使用系统默认密钥"
                        >
                        <p class="text-sm text-gray-400 mt-2">
                            平台已预置官方示例密钥，如需使用自有密钥，可在此处进行覆盖配置。
                        </p>
                    </div>

                    <div>
                        <label for="model" class="block text-yellow-400 font-medium mb-2">模型选择</label>
                        <select id="model" name="model" class="input-field w-full px-4 py-3 rounded-lg">
                            <option value="deepseek-chat">deepseek-chat (推荐)</option>
                            <option value="deepseek-reasoner">deepseek-reasoner (思考模式)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="temperature" class="block text-yellow-400 font-medium mb-2">创造性 (0-1)</label>
                            <input 
                                type="range" 
                                id="temperature" 
                                name="temperature" 
                                min="0" 
                                max="1" 
                                step="0.1" 
                                value="0.7"
                                class="w-full"
                            >
                            <div class="text-center text-sm text-gray-400 mt-1">
                                <span id="temperatureValue">0.7</span>
                            </div>
                        </div>
                        <div>
                            <label for="maxTokens" class="block text-yellow-400 font-medium mb-2">最大长度</label>
                            <input 
                                type="number" 
                                id="maxTokens" 
                                name="maxTokens" 
                                min="100" 
                                max="4000" 
                                value="2000"
                                class="input-field w-full px-4 py-3 rounded-lg"
                            >
                        </div>
                    </div>

                    <button type="submit" class="glow-button w-full px-6 py-4 rounded-lg text-black font-bold text-lg">
                        💾 保存设置
                    </button>
                </form>

                <!-- 当前设置显示 -->
                <div id="currentSettings" class="mt-8 p-4 bg-gray-800 rounded-lg">
                    <h3 class="text-yellow-400 font-bold mb-4">当前设置</h3>
                    <div id="settingsDisplay" class="text-gray-300">
                        <p>API密钥: <span id="keyStatus" class="text-red-400">未设置</span></p>
                        <p>模型: <span id="modelStatus">deepseek-chat</span></p>
                        <p>创造性: <span id="tempStatus">0.7</span></p>
                        <p>最大长度: <span id="tokensStatus">2000</span></p>
                    </div>
                </div>

                <!-- 测试连接 -->
                <div class="mt-6">
                    <button id="testConnection" class="border-2 border-yellow-400 text-yellow-400 hover:bg-yellow-400 hover:text-black px-6 py-3 rounded-lg font-bold transition-all duration-300 w-full">
                        🧪 测试连接
                    </button>
                    <div id="testResult" class="mt-4 text-center hidden"></div>
                </div>

                <!-- 使用说明 -->
                <div class="mt-8 p-4 bg-blue-900 bg-opacity-30 rounded-lg">
                    <h3 class="text-blue-400 font-bold mb-3">📖 使用说明</h3>
                    <div class="text-sm text-gray-300 space-y-2">
                        <p>1. 在DeepSeek平台注册并获取API密钥</p>
                        <p>2. 将API密钥粘贴到上方输入框</p>
                        <p>3. 调整模型参数以获得最佳体验</p>
                        <p>4. 点击"测试连接"验证设置是否正确</p>
                        <p>5. 保存设置后即可享受AI增强的占卜体验</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="main.js"></script>
    <script>
        const DEFAULT_DEEPSEEK_KEY = typeof DEEPSEEK_CONFIG !== 'undefined' ? DEEPSEEK_CONFIG.apiKey : '';

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadCurrentSettings();
            setupEventListeners();
        });

        // 加载当前设置
        function loadCurrentSettings() {
            const storedKey = localStorage.getItem('deepseek_api_key');
            const model = localStorage.getItem('deepseek_model') || (typeof DEEPSEEK_CONFIG !== 'undefined' ? DEEPSEEK_CONFIG.model : 'deepseek-chat') || 'deepseek-chat';
            const temperature = localStorage.getItem('deepseek_temperature') || (typeof DEEPSEEK_CONFIG !== 'undefined' ? DEEPSEEK_CONFIG.temperature : '0.7') || '0.7';
            const maxTokens = localStorage.getItem('deepseek_max_tokens') || (typeof DEEPSEEK_CONFIG !== 'undefined' ? DEEPSEEK_CONFIG.maxTokens : '2000') || '2000';

            // 更新表单（默认不展示系统密钥，可手动覆盖）
            document.getElementById('apiKey').value = storedKey || '';
            document.getElementById('model').value = model;
            document.getElementById('temperature').value = temperature;
            document.getElementById('temperatureValue').textContent = temperature;
            document.getElementById('maxTokens').value = maxTokens;

            // 同步全局配置以便其他页面实时生效
            if (typeof DEEPSEEK_CONFIG !== 'undefined') {
                DEEPSEEK_CONFIG.model = model;
                DEEPSEEK_CONFIG.temperature = parseFloat(temperature);
                DEEPSEEK_CONFIG.maxTokens = parseInt(maxTokens, 10);
                DEEPSEEK_CONFIG.apiKey = storedKey || DEFAULT_DEEPSEEK_KEY;
            }

            // 更新显示
            updateSettingsDisplay();
        }

        // 更新设置显示
        function updateSettingsDisplay() {
            const storedKey = localStorage.getItem('deepseek_api_key');
            const hasDefaultKey = !storedKey && DEFAULT_DEEPSEEK_KEY;
            const model = localStorage.getItem('deepseek_model') || (typeof DEEPSEEK_CONFIG !== 'undefined' ? DEEPSEEK_CONFIG.model : 'deepseek-chat') || 'deepseek-chat';
            const temperature = localStorage.getItem('deepseek_temperature') || (typeof DEEPSEEK_CONFIG !== 'undefined' ? DEEPSEEK_CONFIG.temperature : '0.7') || '0.7';
            const maxTokens = localStorage.getItem('deepseek_max_tokens') || (typeof DEEPSEEK_CONFIG !== 'undefined' ? DEEPSEEK_CONFIG.maxTokens : '2000') || '2000';

            if (storedKey) {
                document.getElementById('keyStatus').textContent = '已设置自定义密钥';
                document.getElementById('keyStatus').className = 'text-green-400';
            } else if (hasDefaultKey) {
                document.getElementById('keyStatus').textContent = '使用系统默认密钥';
                document.getElementById('keyStatus').className = 'text-blue-400';
            } else {
                document.getElementById('keyStatus').textContent = '未设置';
                document.getElementById('keyStatus').className = 'text-red-400';
            }
            document.getElementById('modelStatus').textContent = model;
            document.getElementById('tempStatus').textContent = temperature;
            document.getElementById('tokensStatus').textContent = maxTokens;
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 温度滑块
            const temperatureSlider = document.getElementById('temperature');
            const temperatureValue = document.getElementById('temperatureValue');
            
            temperatureSlider.addEventListener('input', function() {
                temperatureValue.textContent = this.value;
            });

            // 表单提交
            document.getElementById('apiKeyForm').addEventListener('submit', function(e) {
                e.preventDefault();
                saveSettings();
            });

            // 测试连接
            document.getElementById('testConnection').addEventListener('click', function() {
                testConnection();
            });
        }

        // 保存设置
        function saveSettings() {
            const formData = new FormData(document.getElementById('apiKeyForm'));

            const apiKey = (formData.get('apiKey') || '').trim();
            const model = formData.get('model') || (typeof DEEPSEEK_CONFIG !== 'undefined' ? DEEPSEEK_CONFIG.model : 'deepseek-chat');
            const temperature = formData.get('temperature') || (typeof DEEPSEEK_CONFIG !== 'undefined' ? DEEPSEEK_CONFIG.temperature : '0.7');
            const maxTokens = formData.get('maxTokens') || (typeof DEEPSEEK_CONFIG !== 'undefined' ? DEEPSEEK_CONFIG.maxTokens : '2000');

            // 保存到localStorage
            if (apiKey) {
                localStorage.setItem('deepseek_api_key', apiKey);
            } else {
                localStorage.removeItem('deepseek_api_key');
            }
            localStorage.setItem('deepseek_model', model);
            localStorage.setItem('deepseek_temperature', temperature);
            localStorage.setItem('deepseek_max_tokens', maxTokens);

            // 更新全局配置
            if (typeof DEEPSEEK_CONFIG !== 'undefined') {
                DEEPSEEK_CONFIG.apiKey = apiKey || DEFAULT_DEEPSEEK_KEY;
                DEEPSEEK_CONFIG.model = model;
                DEEPSEEK_CONFIG.temperature = parseFloat(temperature);
                DEEPSEEK_CONFIG.maxTokens = parseInt(maxTokens, 10);
            }

            // 更新显示
            updateSettingsDisplay();

            // 显示成功消息
            showMessage(apiKey ? '已保存自定义密钥设置！' : '已恢复系统默认密钥！', 'success');
        }

        // 测试连接
        async function testConnection() {
            const testButton = document.getElementById('testConnection');
            const testResult = document.getElementById('testResult');
            
            testButton.disabled = true;
            testButton.textContent = '🔄 测试中...';
            testResult.className = 'mt-4 text-center hidden';

            try {
                const result = await window.mysticalAI.callDeepSeekAPI('请简单回复"连接成功"', 'fortune');
                
                testResult.className = 'mt-4 text-center text-green-400';
                testResult.innerHTML = '✅ 连接成功！AI功能已启用';
            } catch (error) {
                testResult.className = 'mt-4 text-center text-red-400';
                testResult.innerHTML = `❌ 连接失败: ${error.message}`;
            } finally {
                testButton.disabled = false;
                testButton.textContent = '🧪 测试连接';
            }
        }

        // 显示消息
        function showMessage(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `fixed top-20 right-4 px-6 py-3 rounded-lg text-white font-bold z-50 ${
                type === 'success' ? 'bg-green-600' : 'bg-red-600'
            }`;
            messageDiv.textContent = message;
            
            document.body.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }
    </script>
</body>
</html>
